<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Đăng ký - TechParts')}"></head>
<body class="font-sans bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden">
    <div class="bg-gradient-to-r from-brand-700 to-brand-500 p-8 text-white text-center">
        <a href="/" class="inline-flex items-center gap-2 mb-4">
            <div class="w-10 h-10 rounded-lg bg-white/20 grid place-items-center">
                <i class="fa-solid fa-microchip text-lg"></i>
            </div>
            <span class="text-xl font-extrabold">TechParts</span>
        </a>
        <h1 class="text-2xl font-bold">Tạo tài khoản</h1>
        <p class="text-white/80 text-sm mt-1">Đăng ký để mua sắm dễ dàng</p>
    </div>

    <form id="registerForm" class="p-8 space-y-3" onsubmit="return doRegister(event)">
        <div id="alert" class="hidden p-3 rounded-md bg-red-50 text-red-700 text-sm border border-red-200"></div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username *</label>
            <input id="username" type="text" required minlength="3"
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
            <input id="email" type="email" required
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password *</label>
            <input id="password" type="password" required minlength="6"
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Họ tên</label>
            <input id="fullName" type="text"
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Số điện thoại</label>
            <input id="phone" type="tel"
                   class="w-full px-3 py-2.5 border border-slate-300 rounded-lg focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
        </div>

        <button type="submit"
                class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-lg">
            <i class="fa-solid fa-user-plus mr-1"></i> Đăng ký
        </button>

        <div class="text-center text-sm text-slate-600">
            Đã có tài khoản?
            <a href="/login" class="text-brand-600 font-medium hover:underline">Đăng nhập</a>
        </div>
    </form>
</div>

<script th:src="@{/js/auth.js}"></script>
</body>
</html>

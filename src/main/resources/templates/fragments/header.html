<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'TechParts - Linh kiện máy tính'">TechParts</title>

    <link rel="stylesheet" th:href="@{/vendor/tailwind.min.css}">
    <link rel="stylesheet" th:href="@{/vendor/fontawesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/vendor/fonts/inter/inter.css}">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        (function () {
            try {
                const authRaw = localStorage.getItem('auth');
                if (!authRaw) {
                    window.isLoggedIn = false;
                    return;
                }
                const auth = JSON.parse(authRaw);
                window.isLoggedIn = !!(auth && auth.token);
            } catch (e) {
                window.isLoggedIn = false;
            }
        })();
    </script>

    <style>
        body, .font-sans { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
    <script>
        /*
         * Fallback cho ảnh tải thất bại (mất mạng, URL ngoài chết...).
         * Replace <img src bị lỗi> bằng inline SVG placeholder gradient + icon.
         * Chạy ở capture phase để bắt mọi event 'error' khắp document.
         */
        (function () {
            const PLACEHOLDER = 'data:image/svg+xml;utf8,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">' +
                '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">' +
                '<stop offset="0" stop-color="#e2e8f0"/><stop offset="1" stop-color="#cbd5e1"/>' +
                '</linearGradient></defs>' +
                '<rect width="200" height="200" fill="url(%23g)"/>' +
                '<g fill="#94a3b8" transform="translate(60,60)"><rect x="20" y="20" width="40" height="40" rx="4"/>' +
                '<rect x="0"  y="32" width="14" height="4"/><rect x="0"  y="44" width="14" height="4"/>' +
                '<rect x="66" y="32" width="14" height="4"/><rect x="66" y="44" width="14" height="4"/>' +
                '<rect x="32" y="0"  width="4"  height="14"/><rect x="44" y="0"  width="4"  height="14"/>' +
                '<rect x="32" y="66" width="4"  height="14"/><rect x="44" y="66" width="4"  height="14"/>' +
                '</g></svg>'
            );
            document.addEventListener('error', function (e) {
                const t = e.target;
                if (t && t.tagName === 'IMG' && !t.dataset.fbk) {
                    t.dataset.fbk = '1';
                    t.src = PLACEHOLDER;
                }
            }, true);
        })();
    </script>
</head>

<body th:fragment="navbar">
<header class="sticky top-0 z-40 bg-white shadow-sm border-b border-slate-200">
    <div class="bg-brand-900 text-white text-xs">
        <div class="max-w-7xl mx-auto px-4 py-2 flex justify-between">
            <span><i class="fa-solid fa-truck-fast mr-1"></i> Miễn phí giao hàng cho đơn từ 500.000đ</span>
            <div class="space-x-4 hidden sm:block">
                <a href="#" class="hover:text-brand-100"><i class="fa-solid fa-headset mr-1"></i> Hotline: 1900 0000</a>
                <a href="#" class="hover:text-brand-100"><i class="fa-solid fa-location-dot mr-1"></i> Hệ thống cửa hàng</a>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center gap-6">
        <a href="/" class="flex items-center gap-2 shrink-0">
            <div class="w-10 h-10 rounded-lg bg-brand-600 grid place-items-center text-white">
                <i class="fa-solid fa-microchip text-lg"></i>
            </div>
            <span class="text-xl font-extrabold text-brand-900" th:text="${siteName} ?: 'TechParts'">TechParts</span>
        </a>

        <form class="flex-1 max-w-2xl relative" method="get" th:action="@{/products}">
            <input id="searchInput" type="text" name="q" th:value="${q}" placeholder="Tìm CPU, VGA, RAM, mainboard..."
                   class="w-full pl-12 pr-4 py-2.5 rounded-full border border-slate-300 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <button type="submit" class="absolute right-1 top-1/2 -translate-y-1/2 bg-brand-600 hover:bg-brand-700 text-white text-sm font-medium px-4 py-1.5 rounded-full">
                Tìm
            </button>
        </form>

        <nav class="flex items-center gap-5 text-slate-700">
            <div id="userMenu"></div>
            <a href="#" class="hidden md:flex flex-col items-center text-xs hover:text-brand-600">
                <i class="fa-regular fa-heart text-lg"></i><span class="mt-1">Yêu thích</span>
            </a>
            <a th:href="@{/orders/my}" class="hidden md:flex flex-col items-center text-xs hover:text-brand-600">
                <i class="fa-solid fa-box-open text-lg"></i><span class="mt-1">Đơn hàng</span>
            </a>
            <a th:href="@{/cart}" id="cartBtn" class="relative flex flex-col items-center text-xs hover:text-brand-600">
                <i class="fa-solid fa-cart-shopping text-lg"></i>
                <span class="mt-1 hidden md:inline">Giỏ hàng</span>
                <span id="cartCount" class="absolute -top-1 right-0 md:-right-2 bg-red-500 text-white text-[10px] font-bold rounded-full w-5 h-5 grid place-items-center">0</span>
            </a>
        </nav>
    </div>

    <nav class="border-t border-slate-100 bg-slate-50">
        <div class="max-w-7xl mx-auto px-4">
            <ul class="flex items-center gap-6 overflow-x-auto whitespace-nowrap py-2 text-sm font-medium text-slate-700">
                <li><a th:href="@{/}" class="text-brand-600"><i class="fa-solid fa-house mr-1"></i> Trang chủ</a></li>
                <li class="md:hidden"><a th:href="@{/account}" class="hover:text-brand-600"><i class="fa-solid fa-id-card mr-1"></i> Tài khoản</a></li>
                <li class="md:hidden"><a th:href="@{/orders/my}" class="hover:text-brand-600"><i class="fa-solid fa-box-open mr-1"></i> Đơn</a></li>
                <li><a th:href="@{/products}" class="hover:text-brand-600">Tất cả</a></li>
                <li><a th:href="@{/products/category/cpu}" class="hover:text-brand-600">CPU</a></li>
                <li><a th:href="@{/products/category/mainboard}" class="hover:text-brand-600">Mainboard</a></li>
                <li><a th:href="@{/products/category/ram}" class="hover:text-brand-600">RAM</a></li>
                <li><a th:href="@{/products/category/vga}" class="hover:text-brand-600">VGA</a></li>
                <li><a th:href="@{/products/category/psu}" class="hover:text-brand-600">PSU</a></li>
                <li><a th:href="@{/products/category/case}" class="hover:text-brand-600">Case</a></li>
                <li><a th:href="@{/products/category/tan-nhiet}" class="hover:text-brand-600">Tản nhiệt</a></li>
                <li><a th:href="@{/products(sort='sold')}" class="text-red-600"><i class="fa-solid fa-fire mr-1"></i> Bán chạy</a></li>
            </ul>
        </div>
    </nav>

    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-lg shadow-xl opacity-0 pointer-events-none transition-all duration-300 z-50">
        <i class="fa-solid fa-circle-check text-green-400 mr-1"></i>
        <span id="toastMsg"></span>
    </div>

    <script th:src="@{/js/api-helpers.js}"></script>
    <script th:src="@{/js/main.js}"></script>
</header>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${pageTitle})}"></head>
<body class="font-sans bg-slate-50 text-slate-800">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">Thanh toán</h1>

    <form id="checkoutForm" class="bg-white rounded-2xl border border-slate-200 p-5 space-y-4" novalidate>
        <div>
            <label for="phone" class="block text-sm font-medium mb-1">Số điện thoại</label>
            <input id="phone" name="phone" required pattern="^(\+84|0)(3|5|7|8|9)\d{8}$"
                   class="w-full border border-slate-300 rounded-lg px-3 py-2" />
            <div id="error-phone" class="mt-1"></div>
        </div>

        <div>
            <label for="email" class="block text-sm font-medium mb-1">Email</label>
            <input id="email" name="email" type="email" required
                   class="w-full border border-slate-300 rounded-lg px-3 py-2" />
            <div id="error-email" class="mt-1"></div>
        </div>

        <div>
            <label for="address" class="block text-sm font-medium mb-1">Địa chỉ giao hàng</label>
            <input id="address" name="address" required
                   class="w-full border border-slate-300 rounded-lg px-3 py-2" />
            <div id="error-address" class="mt-1"></div>
        </div>

        <div>
            <label for="note" class="block text-sm font-medium mb-1">Ghi chú</label>
            <textarea id="note" name="note" class="w-full border border-slate-300 rounded-lg px-3 py-2"></textarea>
        </div>

        <div>
            <label for="paymentMethod" class="block text-sm font-medium mb-1">Phương thức thanh toán</label>
            <select id="paymentMethod" name="paymentMethod" required
                    class="w-full border border-slate-300 rounded-lg px-3 py-2">
                <option value="">Chọn phương thức</option>
                <option value="SEPAY">SePay</option>
                <option value="COD">COD</option>
            </select>
            <div id="error-paymentMethod" class="mt-1"></div>
        </div>

        <div id="error-items" class="mt-1"></div>
        <div id="merge-warning" class="mt-1"></div>

        <section class="rounded-xl border border-slate-200 p-4 bg-slate-50">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold">Sản phẩm thanh toán</h2>
                <span id="checkoutItemCount" class="text-sm text-slate-500">0 sản phẩm</span>
            </div>
            <div id="checkoutItemsEmpty" class="text-sm text-slate-500">Chưa có sản phẩm được chọn.</div>
            <div id="checkoutItemsList" class="space-y-2"></div>
            <div class="mt-3 pt-3 border-t border-slate-200 flex items-center justify-between">
                <span class="font-medium">Tổng thanh toán</span>
                <span id="checkoutTotal" class="text-lg font-bold text-brand-700">0đ</span>
            </div>
        </section>

        <div id="error-summary"></div>

        <button id="checkoutSubmitButton" type="submit"
                class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-3 rounded-lg">
            Đặt hàng
        </button>
    </form>
</main>

<script th:src="@{/js/checkout.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${pageTitle})}"></head>
<body class="font-sans bg-slate-50 text-slate-800">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
    <nav class="text-sm text-slate-600 mb-4" aria-label="Breadcrumb">
        <a href="/" class="hover:text-brand-600">Trang chủ</a>
        <span class="mx-1.5 text-slate-400">›</span>
        <span class="text-slate-900 font-medium">Tài khoản</span>
    </nav>
    <h1 class="text-2xl md:text-3xl font-bold text-slate-900 mb-6">
        <i class="fa-solid fa-id-card text-brand-600 mr-2"></i>Tài khoản
    </h1>

    <div id="accountGate" class="text-slate-500">Đang tải...</div>

    <div id="accountPanel" class="hidden space-y-6">
        <section class="bg-white rounded-2xl border border-slate-100 p-5 sm:p-6 shadow-sm">
            <h2 class="text-base font-semibold text-slate-900 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-user text-brand-600"></i>Thông tin cá nhân
            </h2>
            <div id="profileMsg" class="mb-3 text-sm"></div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Tên đăng nhập</label>
                    <input id="pfUsername" type="text" disabled class="w-full border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 text-slate-600" />
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">Email</label>
                    <input id="pfEmail" type="email" disabled class="w-full border border-slate-200 rounded-lg px-3 py-2 bg-slate-50 text-slate-600" />
                </div>
                <div>
                    <label for="pfFullName" class="block text-xs text-slate-500 mb-1">Họ tên</label>
                    <input id="pfFullName" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                </div>
                <div>
                    <label for="pfPhone" class="block text-xs text-slate-500 mb-1">Số điện thoại</label>
                    <input id="pfPhone" type="text" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                </div>
                <button type="button" id="btnSaveProfile" class="w-full py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white font-semibold transition-colors">Lưu thay đổi</button>
            </div>
        </section>

        <section class="bg-white rounded-2xl border border-slate-100 p-5 sm:p-6 shadow-sm">
            <h2 class="text-base font-semibold text-slate-900 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-lock text-brand-600"></i>Đổi mật khẩu
            </h2>
            <div id="pwdMsg" class="mb-3 text-sm"></div>
            <div class="space-y-3">
                <div>
                    <label for="pwCurrent" class="block text-xs text-slate-500 mb-1">Mật khẩu hiện tại</label>
                    <input id="pwCurrent" type="password" autocomplete="current-password" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                </div>
                <div>
                    <label for="pwNew" class="block text-xs text-slate-500 mb-1">Mật khẩu mới (tối thiểu 6 ký tự)</label>
                    <input id="pwNew" type="password" autocomplete="new-password" class="w-full border border-slate-300 rounded-lg px-3 py-2" />
                </div>
                <button type="button" id="btnChangePwd" class="w-full py-2.5 rounded-xl border border-slate-300 hover:bg-slate-50 font-semibold transition-colors">Đổi mật khẩu</button>
            </div>
        </section>

        <div class="text-center text-sm">
            <a href="/orders/my" class="text-brand-600 hover:text-brand-700 hover:underline font-medium">
                <i class="fa-solid fa-box-open mr-1"></i>Xem đơn hàng của tôi
            </a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:src="@{/js/account.js}"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Thanh toán thất bại')}"></head>
<body class="font-sans bg-slate-50 text-slate-800 min-h-screen flex flex-col">
    <div th:replace="~{fragments/header :: navbar}"></div>

    <main class="flex-1 flex items-center justify-center px-4 py-10">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8 max-w-md w-full text-center">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-xmark text-3xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Thanh toán thất bại</h1>
            <p class="text-slate-600 mb-6">
                Đã xảy ra lỗi trong quá trình thanh toán cho đơn hàng <strong class="text-brand-600" th:text="${orderCode}"></strong>. Vui lòng thử lại sau.
            </p>
            <div class="flex flex-col gap-3">
                <a th:href="@{/orders/my}" class="w-full inline-flex items-center justify-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-3 rounded-xl transition-colors">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>Thanh toán lại</span>
                </a>
                <a href="/" class="w-full inline-flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold px-6 py-3 rounded-xl transition-colors">
                    <i class="fa-solid fa-house"></i>
                    <span>Về trang chủ</span>
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>

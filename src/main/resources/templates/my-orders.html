<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${pageTitle})}"></head>
<body class="font-sans bg-slate-50 text-slate-800">
<div th:replace="~{fragments/header :: navbar}"></div>

<main class="max-w-5xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">Đơn hàng của tôi</h1>
        <a href="/cart" class="text-sm text-brand-700 hover:underline">Tiếp tục mua sắm</a>
    </div>

    <div id="orderPaymentNotice" class="mb-4"></div>
    <div id="orderSummaryError" class="mb-4"></div>
    <div id="ordersLoading" class="text-slate-500">Đang tải đơn hàng...</div>
    <div id="ordersEmpty" class="hidden bg-white rounded-xl border border-slate-200 p-6 text-slate-500">
        Bạn chưa có đơn hàng nào.
    </div>
    <section id="ordersList" class="space-y-4"></section>
</main>

<script th:src="@{/js/my-orders.js}"></script>
</body>
</html>

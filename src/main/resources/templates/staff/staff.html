<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Quan ly don hang - TechParts')}"></head>
<body class="font-sans bg-slate-100 min-h-screen">

<!-- Header -->
<header class="bg-brand-900 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-lg bg-brand-600 grid place-items-center">
                <i class="fa-solid fa-microchip"></i>
            </div>
            <div>
                <div class="font-bold leading-tight">TechParts Staff</div>
                <div class="text-xs text-white/60">Trang quan ly don hang</div>
            </div>
        </a>
        <div class="flex items-center gap-3 text-sm">
            <span id="userBadge" class="hidden md:inline">
                <i class="fa-solid fa-user-shield mr-1"></i>
                <span id="userBadgeName"></span>
            </span>
            <a href="/" class="hover:text-brand-100"><i class="fa-solid fa-house mr-1"></i> Trang chu</a>
            <button id="logoutBtn" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded-md transition">
                <i class="fa-solid fa-right-from-bracket"></i> Dang xuat
            </button>
        </div>
    </div>
</header>

<!-- Tab Navigation -->
<div class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-7xl mx-auto px-4">
        <nav class="flex gap-1 overflow-x-auto">
            <button data-tab="orders" class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-brand-600 text-brand-600 whitespace-nowrap">
                <i class="fa-solid fa-box-open mr-1"></i> Don hang
            </button>
        </nav>
    </div>
</div>

<div class="max-w-7xl mx-auto px-4 py-6">

    <!-- Loading gate -->
    <div id="loadingGate" class="text-center py-16 text-slate-500">
        <i class="fa-solid fa-spinner fa-spin text-2xl"></i>
        <p class="mt-2">Dang tai...</p>
    </div>

    <!-- Tab: Orders -->
    <div id="tab-orders" class="tab-content">

        <!-- Filter Bar -->
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-6">
            <div class="flex flex-wrap gap-3 items-end">
                <!-- Status filter -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Trang thai</label>
                    <select id="filterStatus" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="">Tat ca</option>
                        <option value="PENDING_CONFIRMATION">Cho xac nhan</option>
                        <option value="PROCESSING">Dang xu ly</option>
                        <option value="SHIPPING">Dang giao</option>
                        <option value="DELIVERED">Da giao</option>
                        <option value="REFUND_REQUESTED">Yeu cau hoan tien</option>
                        <option value="CANCELLED">Da huy</option>
                    </select>
                </div>
                <!-- Date from -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Tu ngay</label>
                    <input type="date" id="filterDateFrom" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>
                <!-- Date to -->
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Den ngay</label>
                    <input type="date" id="filterDateTo" class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>
                <!-- Keyword search -->
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-medium text-slate-500 mb-1">Tim kiem</label>
                    <input type="text" id="filterKeyword" placeholder="Ma don, ten khach hang..."
                           class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500">
                </div>
                <!-- Actions -->
                <div class="flex gap-2">
                    <button id="btnApplyFilter" class="px-4 py-2 rounded-lg bg-brand-700 text-white text-sm font-medium hover:bg-brand-800 transition">
                        <i class="fa-solid fa-magnifying-glass mr-1"></i> Tim kiem
                    </button>
                    <button id="btnResetFilter" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 text-sm hover:bg-slate-50 transition">
                        Dat lai
                    </button>
                </div>
            </div>
        </div>

        <!-- Stats summary -->
        <div id="statsRow" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>

        <!-- Orders list -->
        <div id="ordersLoading" class="text-center py-8 text-slate-500">
            <i class="fa-solid fa-spinner fa-spin"></i> Dang tai don hang...
        </div>
        <div id="ordersEmpty" class="hidden bg-white rounded-xl border border-slate-200 p-8 text-center text-slate-500">
            Khong co don hang nao.
        </div>
        <section id="ordersList" class="space-y-4"></section>
    </div>
</div>

<!-- Order Detail Modal -->
<div id="orderDetailModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40 overflow-y-auto py-8">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl mx-4 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 bg-slate-50">
            <h3 class="text-lg font-semibold text-slate-800">Chi tiet don hang</h3>
            <button id="closeOrderDetail" class="text-slate-400 hover:text-slate-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div id="orderDetailContent" class="px-6 py-5 max-h-[60vh] overflow-y-auto"></div>
        <div id="orderDetailActions" class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3"></div>
    </div>
</div>

<!-- Refund Reject Modal -->
<div id="rejectModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/40">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4 overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-200">
            <h3 class="text-lg font-semibold text-slate-800">Tu choi yeu cau hoan tien</h3>
            <button id="closeRejectModal" class="text-slate-400 hover:text-slate-600 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="px-6 py-5">
            <p class="text-sm text-slate-600 mb-4">Vui long nhap ly do tu choi yeu cau hoan tien.</p>
            <label class="block text-sm font-medium text-slate-700 mb-1">Ly do tu choi <span class="text-red-500">*</span></label>
            <textarea id="rejectNoteInput" rows="4" placeholder="VD: San pham khong nam trong chinh sach bao hanh..."
                      class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500"></textarea>
            <p id="rejectNoteError" class="text-red-500 text-xs mt-1 hidden">Vui long nhap ly do tu choi.</p>
        </div>
        <div class="px-6 py-4 bg-slate-50 flex justify-end gap-3">
            <button id="cancelRejectModal" class="px-4 py-2 rounded-lg border border-slate-300 text-slate-600 text-sm hover:bg-slate-100 transition">Huy bo</button>
            <button id="confirmRejectModal" class="px-4 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold hover:bg-red-700 transition disabled:opacity-50">Xac nhan tu choi</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-lg shadow-xl opacity-0 pointer-events-none transition-all duration-300 z-[100]">
    <span id="toastMsg"></span>
</div>

<script th:src="@{/js/staff.js}"></script>
</body>
</html>

# MySQL cho Spring Boot (khớp application.yaml: localhost:3306, root / 123456)
services:
  mysql:
    image: mysql:8.0
    container_name: it-components-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: it_components_ecommerce
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_it_components_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  mysql_it_components_data:
